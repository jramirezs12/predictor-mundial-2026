# Blueprint de despliegue para Render.com (https://render.com)
# Con este archivo en tu repo, Render configura el servicio automáticamente.
services:
  - type: web
    name: predictor-mundial-2026
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Claves OPCIONALES (mejoran los datos en vivo). Déjalas vacías o
      # configúralas en el panel de Render -> Environment.
      # - key: FOOTBALL_DATA_KEY
      #   sync: false
      # - key: ODDS_API_KEY
      #   sync: false
